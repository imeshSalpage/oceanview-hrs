services:
  mongo:
    image: mongo:7
    container_name: ocean-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ocean_view_resort
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
    container_name: ocean-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongo:27017/ocean_view_resort?authSource=admin
      APP_SEED_ENABLED: true
      SEED_DEFAULT_PASSWORD: Password@123
      JWT_SECRET: change-this-secret-change-this-secret-change-this-secret
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: ocean-frontend
    ports:
      - "3000:3000"
volumes:
  mongo_data:
