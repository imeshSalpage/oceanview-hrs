services:
  mongo:
    image: mongo:7
    container_name: ocean-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
    container_name: ocean-api
    environment:
      MONGODB_URI: mongodb://mongo:27017/ocean_view_resort
      JWT_SECRET: change-this-secret
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: ocean-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mongo_data:
