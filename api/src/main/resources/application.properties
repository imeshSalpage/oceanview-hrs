spring.application.name=ocean-view-resort

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://admin:password@localhost:27017/ocean_view_resort?authSource=admin}

app.jwt.issuer=ocean-view-resort
app.jwt.secret=${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
app.jwt.expiration=3600000

app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.default-password=${SEED_DEFAULT_PASSWORD:Password@123}

google.vision.api.key=${GOOGLE_VISION_API_KEY:}

# Mail Settings
spring.mail.host=${SPRING_MAIL_HOST:mailhog}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:admin}
spring.mail.password=${SPRING_MAIL_PASSWORD:admin}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.from=noreply@oceanview.com

# App Base URL (for email links)
app.base-url=${APP_BASE_URL:http://localhost:3000}
