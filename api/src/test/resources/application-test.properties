# Test configuration
spring.data.mongodb.uri=mongodb://localhost:27017/unused-test-db
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration, \
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration, \
  org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration

# Disable data seeding in tests to avoid database connection
app.seed.enabled=false
