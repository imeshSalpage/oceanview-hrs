services:
  mongo:
    image: mongo:7
    container_name: ocean-mongo-dev
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ocean_view_resort
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: ocean-api-dev
    working_dir: /workspace
    volumes:
      - ./api:/workspace
      - maven_cache:/root/.m2
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongo:27017/ocean_view_resort?authSource=admin
      APP_SEED_ENABLED: "true"
      SEED_DEFAULT_PASSWORD: Password@123
      JWT_SECRET: change-this-secret-change-this-secret-change-this-secret
    command: ./mvnw spring-boot:run
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: ocean-frontend-dev
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
      - frontend_next_cache:/workspace/.next
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mongo_data_dev:
  maven_cache:
  frontend_node_modules:
  frontend_next_cache:
