name: PR Quality Gate

on:
  pull_request:
    branches: ["master"]
    types: [opened, synchronize, reopened]

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        working-directory: api
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/ocean_view_resort_test
          APP_SEED_ENABLED: false
        run: ./mvnw -B test

  frontend-lint-unit:
    name: Frontend Lint + Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm run test:unit

  e2e-playwright:
    name: E2E Playwright
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: api
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/ocean_view_resort_e2e
          APP_SEED_ENABLED: true
        run: |
          ./mvnw spring-boot:run > ../backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..90}; do
            curl -sf http://localhost:8080/api/help && exit 0
            sleep 2
          done
          echo "Backend did not start in time" && cat backend.log && exit 1

      - name: Start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        run: |
          npm run dev > ../frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..90}; do
            curl -sf http://localhost:3000 && exit 0
            sleep 2
          done
          echo "Frontend did not start in time" && cat frontend.log && exit 1

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
